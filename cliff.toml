[changelog]
# The template for the changelog body
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    {%- for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}\
    {%- endfor %}
{% endfor %}
"""
# Removes leading and trailing whitespace
trim = true

[git]
sort_commits = "newest"
# Turn this off so git-cliff does not strip out prefixes
conventional_commits = false
filter_unconventional = true

# Regex for parsing and grouping commits
# The `<!-- X -->` ensures the groups are sorted alphabetically by the template engine
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->" },
    { message = "^fix", group = "<!-- 1 -->" },
    { message = "^chore", group = "<!-- 2 -->" },
    # Catch-all for everything else
    { message = ".*", group = "<!-- 3 -->" },
]