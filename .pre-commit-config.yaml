repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: [--style=file]
        exclude: ^credence/language/lexer\.cc$

  - repo: local
    hooks:
    - id: clang-tidy
      name: clang-tidy
      entry: bash -c 'printf "%s\n" "$@" | xargs -P "$(sysctl -n hw.ncpu)" -I{} clang-tidy -p build --warnings-as-errors=* {}' --
      language: system
      types: [c++, c]
      exclude: ^credence/language/lexer\.cc$
    - id: cppcheck
      name: cppcheck
      entry: cppcheck
      args: ["--enable=warning,performance,portability,style", --inline-suppr, --error-exitcode=1, --cppcheck-build-dir=./build, --language=c++, -I., --suppressions-list=./cppcheck.suppress]
      language: system
      types: [c++, c]
      exclude: ^credence/language/lexer\.cc$